<!DOCTYPE html>
<html>
<head>
  <title>Relativity Mission Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Relativity Mission Dashboard</h2>

<div class="tabs">
  <button id="tab-planner">Mission Planner</button>
  <button id="tab-graph">Graph</button>
  <button id="tab-visual">Visualization</button>
</div>

<div id="planner" class="tab">
  <div class="card">
    <label>Velocity (fraction of c)</label>
    <input id="velocity" type="number" step="0.01" value="0.8">

    <label>Distance (light-years)</label>
    <input id="distance" type="number" step="0.1" value="10">

    <div class="presets">
      <button class="preset" data-v="0.2" data-d="0.000015">Earth → Mars</button>
      <button class="preset" data-v="0.8" data-d="4.37">Alpha Centauri</button>
      <button class="preset" data-v="0.95" data-d="100">Deep Space</button>
    </div>
  </div>

  <div class="card">
    <p>Gamma: <span id="gamma"></span></p>
    <p>Earth Time: <span id="earthTime"></span></p>
    <p>Traveler Time: <span id="travelerTime"></span></p>
    <p>Difference: <span id="difference"></span></p>
    <p>Signal Delay: <span id="signal"></span></p>
  </div>
</div>

<div id="graph" class="tab" style="display:none">
  <canvas id="chart"></canvas>
</div>

<div id="visual" class="tab" style="display:none">
  <canvas id="spaceCanvas" width="800" height="400"></canvas>

  <button id="send-signal">Send Signal</button>
</div>

<script type="module" src="src/main.js"></script>

</body>
</html>
